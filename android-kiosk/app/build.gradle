plugins {
    id "com.android.application"
}

android {
    namespace "br.com.ilnet.totem"
    compileSdk 35

    defaultConfig {
        applicationId "br.com.ilnet.totem"
        minSdk 26
        targetSdk 35
        versionCode 2
        versionName "1.0.1"
    }

    signingConfigs {
        release {
            // Configure pelo Android Studio antes de gerar o APK final assinado.
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}
