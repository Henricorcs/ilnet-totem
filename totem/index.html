<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ILNET Totem</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <!-- Configuração de runtime: URL da API injetada pelo docker-entrypoint.sh -->
  <script src="/config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #050a18; }
    body { font-family: system-ui, -apple-system, sans-serif; color: #fff; }
    /* Desabilita seleção de texto (totem) */
    * { user-select: none; -webkit-user-select: none; }
    input { user-select: auto; -webkit-user-select: auto; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
