<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>ILNET Totem</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <!-- Configuração de runtime: URL da API injetada pelo docker-entrypoint.sh -->
  <script src="/config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #f4f8fc;
      /* Trava altura real — evita resize quando teclado nativo Android tenta subir */
      position: fixed; inset: 0;
      overscroll-behavior: none;
      touch-action: manipulation;
    }
    body { font-family: system-ui, -apple-system, sans-serif; color: #0B1830; }
    /* Desabilita seleção de texto (totem) */
    * { user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
    /* Inputs do totem: nunca chamam o teclado nativo. Texto entra pelo Keyboard.jsx */
    input { user-select: auto; -webkit-user-select: auto; caret-color: transparent; }
    input:focus { outline: none; }
    button { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
